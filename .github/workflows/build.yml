name: OpenDCS Build and unit tests
on:
  pull_request:
    branches:
      - "main"
      - "7.0"
    types: [opened, synchronize, reopened]
  push:
    branches:
      - "main"
      - "7.0"
# Update this value if we need a different Jdk to be used for sonar analysis.
env:
  sonarJdk: 21

jobs:
  compile:
    # Compiles main + test classes, builds the UI war, runs the JS format check, and
    # submits the dependency graph. Populates the shared Gradle build cache (via
    # gradle/actions/setup-gradle) so every downstream test job — ubuntu-tests and the
    # three integration-db engines — starts hot and runs in parallel.
    runs-on: ubuntu-latest
    steps:
      - name: Clean up disk space, so we don't run out.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK
        uses: actions/setup-java@v5.3.0
        with:
          java-version: 21
          distribution: temurin
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0  # NOSONAR first-party Gradle action, tag pinning acceptable
        with:
          dependency-graph: generate-and-submit
          # Force a cache write from this job so downstream test jobs can restore
          # ~/.gradle/caches/modules-2 and caches/<gradle-version>/transforms-* on PR
          # branches. Without this, setup-gradle defaults to read-only on non-default
          # branches and every downstream job re-downloads plugins and re-runs the
          # InstrumentationAnalysisTransform passes.
          cache-read-only: false
      - name: Enable Gradle build cache for CI
        # Writes org.gradle.caching=true into the runner's $GRADLE_USER_HOME so task
        # outputs are stored in the local build cache, which the cache step below
        # persists between jobs via the GitHub Actions cache.
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
      - name: Share Gradle build cache across jobs
        # Persists ~/.gradle/caches/build-cache-1 under a workflow-run-scoped key so
        # downstream jobs (ubuntu-tests, integration-db engines) restore the entries
        # produced here. Cache keys are content-addressed by Gradle, so reusing across
        # PRs is safe — changed sources get new keys and recompile automatically.
        uses: actions/cache@v5.0.5
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-build-cache-${{ runner.os }}-${{ github.run_id }}-${{ github.job }}
          restore-keys: |
            gradle-build-cache-${{ runner.os }}-${{ github.run_id }}-
            gradle-build-cache-${{ runner.os }}-
      - name: install node for react ui
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: javascript/opendcs-web-ui-react/package-lock.json
      - name: Install node dependencies (required to build UI war)
        working-directory: javascript/opendcs-web-ui-react
        run: npm ci --ignore-scripts
      - name: Enforce Formatting
        working-directory: javascript/opendcs-web-ui-react
        run: |
          npm run format:check
      - name: Compile and assemble
        # `testClasses` (unqualified) runs the aggregate task in every subproject so
        # all `:*:compileTestJava` outputs land in the build cache for downstream jobs.
        run: ./gradlew assemble testClasses --info
  ubuntu-tests:
    # Ubuntu unit + LRGS + XML integration tests. Runs in parallel with the integration-db
    # engine jobs once `compile` finishes; all consume the same warmed Gradle cache.
    # `name:` preserves the old check name `tests (ubuntu-latest, 21)` so existing branch
    # protection rules keep matching without needing to be re-edited.
    name: "tests (ubuntu-latest, 21)"
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Clean up disk space, so we don't run out.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK
        uses: actions/setup-java@v5.3.0
        with:
          java-version: 21
          distribution: temurin
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0  # NOSONAR first-party Gradle action, tag pinning acceptable
      - name: Enable Gradle build cache for CI
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
      - name: Share Gradle build cache across jobs
        uses: actions/cache@v5.0.5
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-build-cache-${{ runner.os }}-${{ github.run_id }}-${{ github.job }}
          restore-keys: |
            gradle-build-cache-${{ runner.os }}-${{ github.run_id }}-
            gradle-build-cache-${{ runner.os }}-
      - name: install node for react ui and tests
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: javascript/opendcs-web-ui-react/package-lock.json
      - name: Cache Storybook + Vite deps
        # Storybook+vitest's browser-mode dep optimizer (sb-vitest/deps/*) is
        # flaky on a cold cache: when vite re-bundles deps mid-test the URL
        # query string changes and any module already loading from the old URL
        # 404s with "Failed to fetch dynamically imported module". Caching the
        # warmed dir between runs avoids the cold path entirely. Key is
        # content-addressed by the lockfile + storybook/vite config so any
        # change there invalidates and rebuilds the cache.
        uses: actions/cache@v5.0.5
        with:
          path: javascript/opendcs-web-ui-react/node_modules/.cache/storybook
          key: storybook-cache-${{ runner.os }}-${{ hashFiles('javascript/opendcs-web-ui-react/package-lock.json', 'javascript/opendcs-web-ui-react/.storybook/**', 'javascript/opendcs-web-ui-react/vite.config.ts') }}
          restore-keys: |
            storybook-cache-${{ runner.os }}-
      - name: Install/Setup playwright
        working-directory: javascript/opendcs-web-ui-react
        run : |
          npm ci --ignore-scripts
          npx --no-install --ignore-scripts playwright install
      - name: Unit and LRGS tests
        # Excludes the React storybook tests — those run in the next step with
        # retry because storybook+vitest's browser-mode dep optimizer has a
        # known cold-bundle race (see Cache step above). Other test tasks must
        # fail fast so real regressions surface immediately.
        run: |
          ./gradlew test --info -x :opendcs-web-ui-react:testStorybook
      - name: Storybook tests (with retry on flake)
        # Wraps just the storybook task in a 2-attempt retry. Each attempt is a
        # fresh vitest process (fresh dep-optimizer state); the on-disk cache
        # warmed by attempt #1 carries into attempt #2, so the rerun is fast
        # and deterministic. The vitest test.retry inside the run doesn't help
        # because the failure is at file-import level, not test runtime.
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: ./gradlew :opendcs-web-ui-react:testStorybook --info
      - name: integration tests (XML)
        run: |
          ./gradlew :testing:opendcs-tests:testOpenDCSXML --info
      - name: Upload jacoco exec data (tests)
        uses: actions/upload-artifact@v7.0.1
        with:
          name: jacoco-exec-tests
          path: |
            ./**/build/jacoco/*.exec
            ./**/build/reports/jacoco/**
            ./javascript/opendcs-web-ui-react/coverage/**
            ./javascript/opendcs-web-ui-react/build/eslint-report.json
          if-no-files-found: warn
      - name: Upload Test Reports
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: test-report-ubuntu-${{ env.sonarJdk }}
          path: |
            ./**/build/reports/tests/**
            ./**/build/test-results/**
          if-no-files-found: error
      - name: Test Report
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: always()
        with:
          annotate_only: true
          include_passed: true
          report_paths: '**/TEST-*.xml'
          detailed_summary: true
  tests:
    # Cross-platform smoke tests on macOS/Windows. The ubuntu equivalents run in `build`
    # so we don't compile twice on the same OS.
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
        jdk: [21]
    runs-on: ${{matrix.platform}}
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK
        uses: actions/setup-java@v5.3.0
        with:
          java-version: ${{matrix.jdk}}
          distribution: temurin
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0  # NOSONAR first-party Gradle action, tag pinning acceptable
      - name: Enable Gradle build cache for CI
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
      - name: Enable Gradle build cache for CI (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p "$HOME/.gradle"
          echo "org.gradle.caching=true" >> "$HOME/.gradle/gradle.properties"
      - name: Share Gradle build cache across jobs
        uses: actions/cache@v5.0.5
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-build-cache-${{ runner.os }}-${{ github.run_id }}-${{ github.job }}
          restore-keys: |
            gradle-build-cache-${{ runner.os }}-${{ github.run_id }}-
            gradle-build-cache-${{ runner.os }}-
      - name: Change temp dir in windows
        if: matrix.platform == 'windows-latest'
        run: |
          echo "TEMP=$env:USERPROFILE\AppData\Local\Temp" >> $env:GITHUB_ENV
          echo "TMP=$env:USERPROFILE\AppData\Local\Temp" >> $env:GITHUB_ENV
      - name: install node for react ui and tests
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: javascript/opendcs-web-ui-react/package-lock.json
      - name: Cache Storybook + Vite deps
        # See ubuntu-tests for rationale. Per-OS cache key because the warmed
        # bundles include host-specific paths.
        uses: actions/cache@v5.0.5
        with:
          path: javascript/opendcs-web-ui-react/node_modules/.cache/storybook
          key: storybook-cache-${{ runner.os }}-${{ hashFiles('javascript/opendcs-web-ui-react/package-lock.json', 'javascript/opendcs-web-ui-react/.storybook/**', 'javascript/opendcs-web-ui-react/vite.config.ts') }}
          restore-keys: |
            storybook-cache-${{ runner.os }}-
      - name: Install/Setup playwright
        working-directory: javascript/opendcs-web-ui-react
        run : |
          npm ci --ignore-scripts
          npx --no-install --ignore-scripts playwright install
      - name: Unit and LRGS tests
        # See ubuntu-tests for why storybook is split out.
        run: |
          ./gradlew test --info -x :opendcs-web-ui-react:testStorybook
      - name: Storybook tests (with retry on flake)
        # See ubuntu-tests for rationale. macOS/Windows runners are slower so
        # the optimizer race surfaces here more often than on Linux.
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 2
          timeout_minutes: 20
          command: ./gradlew :opendcs-web-ui-react:testStorybook --info
      - name: integration tests (XML)
        # XML is the cross-platform integration smoke test. DB-backed engines
        # (Postgres, Oracle, CWMS-Oracle) run only on ubuntu in the integration-db
        # matrix because they require docker.
        run: |
          ./gradlew :testing:opendcs-tests:testOpenDCSXML --info
      - name: Upload Test Reports
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: test-report-${{ runner.os }}-${{ matrix.jdk }}
          path: |
            ./**/build/reports/tests/**
            ./**/build/test-results/**
          if-no-files-found: error
      - name: Test Report
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: always()
        with:
          annotate_only: true
          include_passed: true
          report_paths: '**/TEST-*.xml'
          detailed_summary: true
  integration-db:
    # Database-backed integration suites run in parallel, one runner per engine.
    # `needs: compile` ensures the Gradle build cache is already populated so each
    # engine job skips compilation and goes straight to running its test task.
    # Runs concurrently with `ubuntu-tests` (unit + XML) since both consume the cache.
    needs: compile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine:
          - name: opendcs-postgres
            task: testOpenDCSPostgres
          - name: opendcs-oracle
            task: testOpenDCSOracle
          - name: cwms-oracle
            task: testCWMSOracle
    steps:
      - name: Clean up disk space, so we don't run out.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK
        uses: actions/setup-java@v5.3.0
        with:
          java-version: 21
          distribution: temurin
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0  # NOSONAR first-party Gradle action, tag pinning acceptable
      - name: Enable Gradle build cache for CI
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
      - name: Share Gradle build cache across jobs
        uses: actions/cache@v5.0.5
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-build-cache-${{ runner.os }}-${{ github.run_id }}-${{ github.job }}
          restore-keys: |
            gradle-build-cache-${{ runner.os }}-${{ github.run_id }}-
            gradle-build-cache-${{ runner.os }}-
      - name: install node for react ui and tests
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: javascript/opendcs-web-ui-react/package-lock.json
      - name: Install node dependencies (required to build UI war)
        working-directory: javascript/opendcs-web-ui-react
        run: npm ci --ignore-scripts
      - name: integration tests (${{ matrix.engine.name }})
        run: |
          ./gradlew :testing:opendcs-tests:${{ matrix.engine.task }} --info
      - name: Upload jacoco exec data
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: jacoco-exec-${{ matrix.engine.name }}
          path: |
            ./**/build/jacoco/*.exec
            ./**/build/reports/jacoco/**
          if-no-files-found: warn
      - name: Upload Test Reports
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: test-report-${{ matrix.engine.name }}
          path: |
            ./**/build/reports/tests/**
            ./**/build/test-results/**
          if-no-files-found: error
      - name: Test Report
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: always()
        with:
          annotate_only: true
          include_passed: true
          report_paths: '**/TEST-*.xml'
          detailed_summary: true
  coverage:
    # Aggregates jacoco exec files from `ubuntu-tests` (unit + XML) and every `integration-db`
    # matrix entry into the single `coverage` artifact that sonar.yaml consumes. `tests`
    # (macOS/Windows) is included only to gate publishing on those passing — it produces no
    # coverage of its own.
    needs: [ubuntu-tests, tests, integration-db]
    runs-on: ubuntu-latest
    steps:
      - name: Clean up disk space, so we don't run out.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK
        uses: actions/setup-java@v5.3.0
        with:
          java-version: ${{ env.sonarJdk }}
          distribution: temurin
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0  # NOSONAR first-party Gradle action, tag pinning acceptable
      - name: Enable Gradle build cache for CI
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
      - name: Share Gradle build cache across jobs
        uses: actions/cache@v5.0.5
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-build-cache-${{ runner.os }}-${{ github.run_id }}-${{ github.job }}
          restore-keys: |
            gradle-build-cache-${{ runner.os }}-${{ github.run_id }}-
            gradle-build-cache-${{ runner.os }}-
      - name: install node for react ui
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: javascript/opendcs-web-ui-react/package-lock.json
      - name: Cache SonarCloud packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Restore jacoco exec data and UI coverage
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: jacoco-exec-*
          path: ./
          merge-multiple: true
      - name: Compile classes for coverage report
        run: ./gradlew classes --info
      - name: Generate aggregate coverage report
        run: ./gradlew codeCoverageReport --info
      - name: Upload Coverage
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage
          path: |
            ./**/build/**/jacoco/**/*.xml
            ./**/build/**/test-*.xml
            ./build/reports/jacoco/codeCoverageReport/**/
            ./**/build/**/*.class
            ./javascript/opendcs-web-ui-react/coverage/**
            ./javascript/opendcs-web-ui-react/build/eslint-report.json
  containers:
    runs-on: [ubuntu-latest]
    steps:
      - name: Clean up disk space, so we don't run out.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
      - uses: actions/checkout@v7.0.0
      - name: Build base container images
        run: |
          docker build -t opendcs:test-container --target opendcs_base .
