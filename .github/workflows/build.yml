name: OpenDCS Build and unit tests
on:
  pull_request:
    branches:
      - "main"
      - "7.0"
    types: [opened, synchronize, reopened]
  push:
    branches:
      - "main"
      - "7.0"
# Update this value if we need a different Jdk to be used for sonar analysis.
env:
  sonarJdk: 21

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
        jdk: [21]
    runs-on: ${{matrix.platform}}
    steps:
      - name: Clean up disk space, so we don't run out.
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
      - uses: actions/checkout@v6.0.2
      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: ${{matrix.jdk}}
          distribution: temurin
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.0.1
        with:
          dependency-graph: generate-and-submit
      - name: Change temp dir in windows
        if: matrix.platform == 'windows-latest'
        run: |
          echo "TEMP=$env:USERPROFILE\AppData\Local\Temp" >> $env:GITHUB_ENV
          echo "TMP=$env:USERPROFILE\AppData\Local\Temp" >> $env:GITHUB_ENV
      - name: install node for react ui and tests
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: javascript/opendcs-web-ui-react/package-lock.json
      - name: Install/Setup playwright
        working-directory: javascript/opendcs-web-ui-react
        run : |
          npm install
          npx playwright install
      - name: Enforce Formatting
        working-directory: javascript/opendcs-web-ui-react
        run : |
          npm run format:check
      - name: Unit and LRGS tests
        run: |
          ./gradlew test --info
      - name: integration tests (XML)
        # There is an odd issues with the log file name on the windows runner.
        # It does work locally though. Will work on it later.
        # Integration tests require docker now for test containers.
        # More work required to deal with the other platforms. Should be workable
        # at some point though.
        run: |
          ./gradlew :testing:opendcs-tests:testOpenDCSXML --info
      - name: Upload jacoco exec data (tests)
        if: matrix.platform == 'ubuntu-latest' && matrix.jdk == env.sonarJdk
        uses: actions/upload-artifact@v7.0.0
        with:
          name: jacoco-exec-tests
          path: |
            ./**/build/jacoco/*.exec
            ./javascript/opendcs-web-ui-react/coverage/**
            ./javascript/opendcs-web-ui-react/build/eslint-report.json
          if-no-files-found: warn
      - name: Upload Test Reports
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: test-report-${{ runner.os }}-${{ matrix.jdk }}
          path: |
            ./**/build/reports/tests/**
            ./**/build/test-results/**
          if-no-files-found: error
      - name: Test Report
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        if: always()
        with:
          annotate_only: true
          include_passed: true
          report_paths: '**/TEST-*.xml'
          detailed_summary: true
  integration-db:
    # Database-backed integration suites run in parallel, one runner per engine.
    needs: tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine:
          - name: opendcs-postgres
            task: testOpenDCSPostgres
          - name: opendcs-oracle
            task: testOpenDCSOracle
          - name: cwms-oracle
            task: testCWMSOracle
    steps:
      - name: Clean up disk space, so we don't run out.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
      - uses: actions/checkout@v6.0.2
      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.0.1
      - name: install node for react ui and tests
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: javascript/opendcs-web-ui-react/package-lock.json
      - name: Install node dependencies (required to build UI war)
        working-directory: javascript/opendcs-web-ui-react
        run: npm install
      - name: integration tests (${{ matrix.engine.name }})
        run: |
          ./gradlew :testing:opendcs-tests:${{ matrix.engine.task }} --info
      - name: Upload jacoco exec data
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: jacoco-exec-${{ matrix.engine.name }}
          path: ./**/build/jacoco/*.exec
          if-no-files-found: warn
      - name: Upload Test Reports
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: test-report-${{ matrix.engine.name }}
          path: |
            ./**/build/reports/tests/**
            ./**/build/test-results/**
          if-no-files-found: error
      - name: Test Report
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        if: always()
        with:
          annotate_only: true
          include_passed: true
          report_paths: '**/TEST-*.xml'
          detailed_summary: true
  coverage:
    # Aggregates jacoco exec files from `tests` (ubuntu) and every `integration-db` matrix entry
    # into the single `coverage` artifact that sonar.yaml consumes.
    needs: [tests, integration-db]
    runs-on: ubuntu-latest
    steps:
      - name: Clean up disk space, so we don't run out.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
      - uses: actions/checkout@v6.0.2
      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: ${{ env.sonarJdk }}
          distribution: temurin
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.0.1
      - name: install node for react ui
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: javascript/opendcs-web-ui-react/package-lock.json
      - name: Cache SonarCloud packages
        uses: actions/cache@v5.0.4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v5.0.4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Restore jacoco exec data and UI coverage
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: jacoco-exec-*
          path: ./
          merge-multiple: true
      - name: Compile classes for coverage report
        run: ./gradlew classes --info
      - name: Generate aggregate coverage report
        run: ./gradlew codeCoverageReport --info
      - name: Upload Coverage
        uses: actions/upload-artifact@v7.0.0
        with:
          name: coverage
          path: |
            ./**/build/**/jacoco/**/*.xml
            ./**/build/**/test-*.xml
            ./build/reports/jacoco/codeCoverageReport/**/
            ./**/build/**/*.class
            ./javascript/opendcs-web-ui-react/coverage/**
            ./javascript/opendcs-web-ui-react/build/eslint-report.json
  containers:
    runs-on: [ubuntu-latest]
    steps:
      - name: Clean up disk space, so we don't run out.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
      - uses: actions/checkout@v6.0.2
      - name: Build base container images
        run: |
          docker build -t opendcs:test-container --target opendcs_base .
