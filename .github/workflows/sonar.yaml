name: SonarCloud Scan
on:
  workflow_run:
    workflows: ["OpenDCS Build and unit tests"]
    types: [completed]
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'Run ID of an "OpenDCS Build and unit tests" workflow whose coverage to analyze. Find it via `gh run list --workflow="OpenDCS Build and unit tests"` or copy the numeric id from the run URL.'
        required: true
        type: string

jobs:
  Sonar:
    runs-on: ubuntu-latest
    # `workflow_run`-triggered runs do not auto-attach a status to the PR, so we
    # create our own check on the head SHA below; this needs `checks: write`.
    permissions:
      contents: read
      checks: write
    # Auto-trigger only when the upstream build succeeded; manual dispatch is always allowed.
    if: |
      github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Resolve source build context
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.build_run_id || github.event.workflow_run.id }}
          EVENT_NAME: ${{ github.event_name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WR_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_HEAD_REPO_FULL: ${{ github.event.workflow_run.head_repository.full_name }}
          WR_HEAD_OWNER: ${{ github.event.workflow_run.head_repository.owner.login }}
          WR_BASE_OWNER: ${{ github.event.workflow_run.repository.owner.login }}
          WR_EVENT: ${{ github.event.workflow_run.event }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            run_json=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}")
            head_sha=$(jq -r '.head_sha' <<<"$run_json")
            head_branch=$(jq -r '.head_branch' <<<"$run_json")
            head_repo_full=$(jq -r '.head_repository.full_name' <<<"$run_json")
            head_owner=$(jq -r '.head_repository.owner.login' <<<"$run_json")
            base_owner=$(jq -r '.repository.owner.login' <<<"$run_json")
            event=$(jq -r '.event' <<<"$run_json")
            conclusion=$(jq -r '.conclusion' <<<"$run_json")
            if [[ "$conclusion" != "success" ]]; then
              echo "::warning::Build run $RUN_ID concluded as '$conclusion' (not 'success'). Continuing because this is a manual dispatch."
            fi
          else
            head_sha="$WR_HEAD_SHA"
            head_branch="$WR_HEAD_BRANCH"
            head_repo_full="$WR_HEAD_REPO_FULL"
            head_owner="$WR_HEAD_OWNER"
            base_owner="$WR_BASE_OWNER"
            event="$WR_EVENT"
          fi
          if [[ "$head_owner" != "$base_owner" ]]; then
            pr_branch="${head_owner}:${head_branch}"
          else
            pr_branch="$head_branch"
          fi
          {
            echo "head_sha=$head_sha"
            echo "head_branch=$head_branch"
            echo "head_repo_full=$head_repo_full"
            echo "pr_branch=$pr_branch"
            echo "event=$event"
            if [[ "$event" == "pull_request" ]]; then
              echo "is_pr=true"
            else
              echo "is_pr=false"
            fi
          } >> "$GITHUB_OUTPUT"
      - name: 'Get PR number'
        id: pr-context
        env:
          # The GH CLI uses this ENV for providing an auth token:
          GH_TOKEN: ${{ github.token }}
          PR_TARGET_REPO: ${{ github.repository }}
          PR_BRANCH: ${{ steps.ctx.outputs.pr_branch }}
          IS_PR: ${{ steps.ctx.outputs.is_pr }}
        # Query the PR number by repo + branch, then assign to step output:
        run: |
          if [[ ${IS_PR} == "true" ]]; then
            gh pr view --repo "${PR_TARGET_REPO}" "${PR_BRANCH}" --json 'number' --jq '"number=\(.number)"' >> "${GITHUB_OUTPUT}"
            echo "source_branch=${PR_BRANCH}" >> ${GITHUB_OUTPUT}
            base_ref=`gh pr view --repo "${PR_TARGET_REPO}" "${PR_BRANCH}" --json 'baseRefName' --jq '(.baseRefName)'`
            if [[ "${base_ref}" =~ (main|7.0) ]]; then
              echo "target_branch=${base_ref}" >> ${GITHUB_OUTPUT}
            else
              echo "PR is targetting an invalid branch"
              exit 1
            fi
          fi
      # Surface this workflow on the PR before any long-running step so reviewers
      # see "SonarCloud Workflow — in progress" instead of nothing while the
      # gradle scan is uploading to SonarCloud. The final step below patches it
      # to success/failure regardless of how the job exits.
      - name: Create in-progress check on PR head
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.ctx.outputs.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          check_id=$(gh api -X POST "repos/${REPO}/check-runs" \
            -f name="SonarCloud Workflow" \
            -f head_sha="${HEAD_SHA}" \
            -f status="in_progress" \
            -f details_url="${RUN_URL}" \
            -f "output[title]=SonarCloud analysis running" \
            -f "output[summary]=Uploading scan to SonarCloud. The SonarCloud check posted by the SonarCloud app may take additional time to appear after this completes." \
            --jq .id)
          echo "id=${check_id}" >> "${GITHUB_OUTPUT}"
      - name: Set up JDK
        uses: actions/setup-java@v5.4.0
        with:
          java-version: 21
          distribution: temurin
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0  # NOSONAR first-party Gradle action, tag pinning acceptable
      - name: Checkout PR code
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{ steps.ctx.outputs.head_repo_full }}
          ref: ${{ steps.ctx.outputs.head_sha }}
          fetch-depth: 0
    # perform the analaysis now
      - name: Cache SonarCloud packages
        uses: actions/cache@v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v6.1.0
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Download Coverage
        uses: actions/download-artifact@v8.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event_name == 'workflow_dispatch' && inputs.build_run_id || github.event.workflow_run.id }}
          path: ./_artifacts
      # Each artifact lands in ./_artifacts/<artifact-name>/. Restore them into the
      # workspace, but suffix `TEST-*.xml` files with their source artifact so the
      # same test class from two matrix jobs (e.g. ubuntu-21 and macOS-21) cannot
      # race-overwrite each other and produce a half-written XML that crashes
      # Sonar's Surefire parser.
      - name: Stage artifacts into workspace (namespace TEST-*.xml per source)
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          for art_dir in ./_artifacts/*/; do
            art=$(basename "$art_dir")
            while IFS= read -r -d '' src; do
              rel=${src#"$art_dir"}
              if [[ "$(basename "$src")" == TEST-*.xml ]]; then
                dest="./${rel%.xml}.${art}.xml"
              else
                dest="./${rel}"
              fi
              mkdir -p "$(dirname "$dest")"
              cp "$src" "$dest"
            done < <(find "$art_dir" -type f -print0)
          done
          rm -rf ./_artifacts
      - name: Show jacoco files
        run : |
          find . -name "jacoco*.xml" -type f
      - name: Analyze Main Code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
         ./gradlew sonar --info -Dorg.gradle.jvmargs=-Xmx4096M \
            -Dsonar.scm.revision=${{ steps.ctx.outputs.head_sha }} \
            -Dsonar.pullrequest.key=${{ steps.pr-context.outputs.number }} \
            -Dsonar.pullrequest.branch=${{ steps.pr-context.outputs.source_branch }} \
            -Dsonar.pullrequest.base=${{ steps.pr-context.outputs.target_branch }} \
            -Dsonar.exclusions=**/javascript/opendcs-web-ui-react/**/*.* \
            -Dsonar.coverage.jacoco.aggregateXmlReportPaths=build/reports/jacoco/codeCoverageReport/codeCoverageReport.xml
      - name: Analyze UI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
         ./gradlew sonar --info -Dorg.gradle.jvmargs=-Xmx4096M \
            -Dsonar.scm.revision=${{ steps.ctx.outputs.head_sha }} \
            -Dsonar.pullrequest.key=${{ steps.pr-context.outputs.number }} \
            -Dsonar.pullrequest.branch=${{ steps.pr-context.outputs.source_branch }} \
            -Dsonar.pullrequest.base=${{ steps.pr-context.outputs.target_branch }} \
            -Dsonar.coverage.jacoco.xmlReportPaths= \
            -Dsonar.coverage.jacoco.aggregateXmlReportPaths= \
            -Dsonar.exclusions="**/*.java" \
            -Dsonar.test.exclusions=**/*.java \
            -Dsonar.projectBaseDir=javascript/opendcs-web-ui-react \
            -PUI=true \
            -Dsonar.projectKey=opendcs_opendcs_ui \
            -Dsonar.projectName="OpenDCS UI"
      # Always patch the check run created above so the PR shows a definitive
      # outcome instead of a stuck "in progress" badge when the job ends.
      - name: Finalize check on PR head
        if: always() && steps.check.outputs.id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CHECK_ID: ${{ steps.check.outputs.id }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          case "${JOB_STATUS}" in
            success)   conclusion="success"; title="SonarCloud scan submitted";;
            cancelled) conclusion="cancelled"; title="SonarCloud workflow cancelled";;
            *)         conclusion="failure"; title="SonarCloud workflow failed";;
          esac
          gh api -X PATCH "repos/${REPO}/check-runs/${CHECK_ID}" \
            -f status="completed" \
            -f conclusion="${conclusion}" \
            -f details_url="${RUN_URL}" \
            -f "output[title]=${title}" \
            -f "output[summary]=See the workflow run for full logs. The SonarCloud app posts its own analysis result check separately once the cloud analysis finishes."
