name: SonarCloud Scan
on:
  workflow_run:
    workflows: ["OpenDCS Build and unit tests"]
    types: [completed]

jobs:
  Sonar:
    runs-on: ubuntu-latest
    if: github.event.workflow_run && github.event.workflow_run.conclusion == 'success'
    steps:
      - name: 'Get PR number'
        id: pr-context
        env:
          # The GH CLI uses this ENV for providing an auth token:
          GH_TOKEN: ${{ github.token }}
          PR_TARGET_REPO: ${{ github.repository }}
          PR_BRANCH: |-
            ${{
              (github.event.workflow_run.head_repository.owner.login != github.event.workflow_run.repository.owner.login)
                && format('{0}:{1}', github.event.workflow_run.head_repository.owner.login, github.event.workflow_run.head_branch)
                || github.event.workflow_run.head_branch
            }}
          IS_PR: ${{ (github.event.workflow_run.event == 'pull_request') && true || false }}
        # Query the PR number by repo + branch, then assign to step output:
        run: |
          if [[ ${IS_PR} == "true" ]]; then
            gh pr view --repo "${PR_TARGET_REPO}" "${PR_BRANCH}" --json 'number' --jq '"number=\(.number)"' >> "${GITHUB_OUTPUT}"
            echo "source_branch=${PR_BRANCH}" >> ${GITHUB_OUTPUT}
            base_ref=`gh pr view --repo "${PR_TARGET_REPO}" "${PR_BRANCH}" --json 'baseRefName' --jq '(.baseRefName)'`
            if [[ "${base_ref}" =~ (main|7.0) ]]; then
              echo "target_branch=${base_ref}" >> ${GITHUB_OUTPUT}
            else
              echo "PR is targetting an invalid branch"
              exit 1
            fi
          fi
      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5.0.1
      - name: Checkout PR code
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ steps.pr-context.outputs.source_branch }}
          fetch-depth: 0
    # perform the analaysis now
      - name: Cache SonarCloud packages
        uses: actions/cache@v5.0.3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v5.0.3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Download Coverage
        uses: actions/download-artifact@v7.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ./
          merge-multiple: true
      - name: Show jacoco files
        run : |
          find . -name "jacoco*.xml" -type f
      - name: Analyze Main Code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.pull_requests[0].head.ref }}
        run: |
         ./gradlew sonar --info -Dorg.gradle.jvmargs=-Xmx4096M \
            -Dsonar.scm.revision=${{ github.event.workflow_run.head_sha }} \
            -Dsonar.pullrequest.key=${{ github.event.workflow_run.pull_requests[0].number }} \
            -Dsonar.pullrequest.branch=${BRANCH} \
            -Dsonar.pullrequest.base=${{ github.event.workflow_run.pull_requests[0].base.ref }} \
            -Dsonar.exclusions=javascript/opendcs-web-ui-react \
            -Dsonar.coverage.jacoco.aggregateXmlReportPaths=build/reports/jacoco/codeCoverageReport/codeCoverageReport.xml
      - name: Analyze UI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.pull_requests[0].head.ref }}
        run: |
         ./gradlew sonar --info -Dorg.gradle.jvmargs=-Xmx4096M \
            -Dsonar.scm.revision=${{ github.event.workflow_run.head_sha }} \
            -Dsonar.pullrequest.key=${{ steps.pr-context.outputs.number }} \
            -Dsonar.pullrequest.branch=${{ steps.pr-context.outputs.source_branch }} \
            -Dsonar.pullrequest.base=${{ steps.pr-context.outputs.target_branch }} \
            -Dsonar.inclusions=javascript/opendcs-web-ui-react \
            -Dsonar.projectKey=opendcs_opendcs_ui
