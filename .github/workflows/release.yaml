---
name: Release
on:
  workflow_call:
    inputs:
      branch:
       type: string
       required: true
      nightly:
        type: boolean
        required: true
    secrets:
      token:
       required: false
      signingKey:
        required: true
      signingKeyPassword:
        required: true
      mavenCentralUsername:
        required: true
      mavenCentralPassword:
        required: true
  workflow_dispatch:
    inputs:
      branch:
        type: choice
        required: true
        description: Which Branch to make the build from
        options:
          - "main"
          - "7.0"
          - "7.5"
      nightly:
        type: boolean
        required: true
        description: Is this part of a "nightly" workflow?
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
        id-token: write
        contents: write
        packages: write
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{inputs.branch}}
      - name: setup java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          # 17 is used as it still supports targeting Java 8 for the build
          # but allows us to update the build and use the more advanced signing tools.
          java-version: '21'
          cache: 'gradle'
      - name: Set Version
        if: inputs.nightly
        env:
          BRANCH: ${{inputs.branch}}
        run: echo "VERSION=${BRANCH}-nightly" >> "$GITHUB_ENV"
      - name: Set Version
        if: inputs.nightly == false
        env:
          BRANCH: ${{inputs.branch}}
        run: echo "VERSION=${BRANCH}" >> "$GITHUB_ENV"
      - name: show version
        run: echo ${VERSION}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.token != null && secrets.token || secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=${{env.VERSION}}
            type=schedule,pattern=${{inputs.branch}}-{{date 'YYYY.MM.DD'}}
            type=schedule,pattern=${{inputs.branch}}-{{date 'YYYY.MM.DD-hhmmss'}}
      - name: Create and Push Docker images
        id: baked
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584
        with:
          source: .
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file }}
          targets: build,lrgs,compproc,compdepends,routingscheduler,web-api,migration
          push: true
      - name: Extract build from build image.
        run: |
          tar -xf out.tar --strip-components=1 --wildcards --no-anchored '*build*'
      - name: weird test
        run: |
          netstat -anp || true
          curl -i https://www.hec.usace.army.mil/nexus/repository/maven-public/mil/army/usace/hec/cwms-db-jooq-codegen/7.0.0-OpenDCS/cwms-db-jooq-codegen-7.0.0-OpenDCS.pom
          
      - name: Build Release
        run: |          
          ./gradlew --info --debug build -x test --max-workers=8
      - name: Sign Artifacts
        run: |
          ./gradlew --info signWar -PversionOverride=$VERSION signDist signMavenPublication -x test -Psign=true \
             -PsigningKeyPassword="${{ secrets.signingKeyPassword != null && secrets.signingKeyPassword || secrets.SIGNING_KEY_PASSWORD }}" \
             -PcentralApiUsername=${{ secrets.mavenCentralUsername != null && secrets.mavenCentralUsername || secrets.ORG_OPENDCS_CENTRALAPI_USERNAME }} \
             -PcentralApiPassword=${{ secrets.mavenCentralPassword != null && secrets.mavenCentralPassword || secrets.ORG_OPENDCS_CENTRALAPI_PASSWORD }} \
             -PsigningKey="${{ secrets.signingKey != null && secrets.signingKey || secrets.SIGNING_KEY }}" \
      - name: Push to central
        # We don't publish to maven central for the nightly builds
        if: inputs.nightly == false
        run: |
          ./gradlew publishAllToNewMavenCentralApi --info -Psign=true \
             -PversionOverride=$VERSION \
             -PsigningKeyPassword="${{ secrets.signingKeyPassword != null && secrets.signingKeyPassword || secrets.SIGNING_KEY_PASSWORD }}" \
             -PcentralApiUsername=${{ secrets.mavenCentralUsername != null && secrets.mavenCentralUsername || secrets.ORG_OPENDCS_CENTRALAPI_USERNAME }} \
             -PcentralApiPassword=${{ secrets.mavenCentralPassword != null && secrets.mavenCentralPassword || secrets.ORG_OPENDCS_CENTRALAPI_PASSWORD }} \
             -PsigningKey="${{ secrets.signingKey != null && secrets.signingKey || secrets.SIGNING_KEY }}" \
             -PautomaticPublish=true \
             -PwaitForPublished=false
      - name: Upload Release
        env:
            GH_TOKEN: "${{ secrets.token != null && secrets.token || secrets.GITHUB_TOKEN }}"
        run: |
          gh release upload ${VERSION} install/build/distributions/opendcs-${VERSION}.tar#opendcs-${VERSION}.tar --clobber
          gh release upload ${VERSION} install/build/distributions/opendcs-${VERSION}.tar.asc#opendcs-${VERSION}.tar.asc --clobber
          gh release upload ${VERSION} install/build/distributions/opendcs-${VERSION}.zip#opendcs-${VERSION}.zip --clobber
          gh release upload ${VERSION} install/build/distributions/opendcs-${VERSION}.zip.asc#opendcs-${VERSION}.zip.asc --clobber
          gh release upload ${VERSION} java/opendcs-rest-api/build/libs/opendcs-rest-api-${VERSION}.war#opendcs-rest-api-${VERSION}.war --clobber
          gh release upload ${VERSION} java/opendcs-rest-api/build/libs/opendcs-rest-api-${VERSION}.war.asc#opendcs-rest-api-${VERSION}.war.asc --clobber
          gh release upload ${VERSION} java/opendcs-rest-api/build/swagger/opendcs-openapi.json#opendcs-openapi.json --clobber
